name: Generate cert-share image

on:
  workflow_dispatch:
  push:
    paths:
      - 'certificate_template.html'
      - 'generate-share-image.js'
      - 'package.json'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: npm ci

      - name: Generate cert-share.png
        run: npm run generate

      - name: Commit and push generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cert-share.png || true
          git commit -m "chore(ci): generate cert-share.png" || echo "no changes to commit"
          git push || echo "push failed" 
